services:
  # ---------------------------------------------------------------------------
  # BACKEND SERVICE (Node.js + Prisma)
  # ---------------------------------------------------------------------------
  - type: web
    name: smart-police-backend
    env: node
    plan: free
    region: singapore # Change to your preferred region
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smart-police-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

  # ---------------------------------------------------------------------------
  # DATABASE SERVICE (PostgreSQL)
  # ---------------------------------------------------------------------------
- database:
    name: smart-police-db
    plan: free
    region: singapore

  # ---------------------------------------------------------------------------
  # FRONTEND SERVICE (React + Vite)
  # ---------------------------------------------------------------------------
  - type: web
    name: smart-police-portal
    env: static
    plan: free
    region: singapore
    buildCommand: cd frontend-web && npm install && npm run build
    publishDir: frontend-web/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: smart-police-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
