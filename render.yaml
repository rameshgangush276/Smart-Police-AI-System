services:
  # ---------------------------------------------------------------------------
  # BACKEND SERVICE (Node.js + Prisma)
  # ---------------------------------------------------------------------------
  - type: web
    name: smart-police-backend
    env: node
    plan: free
    region: singapore
    buildCommand: cd backend && npm install --include=dev && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma db push --accept-data-loss && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smart-police-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

# ---------------------------------------------------------------------------
# DATABASE SERVICE (PostgreSQL)
# ---------------------------------------------------------------------------
databases:
  - name: smart-police-db
    plan: free
    region: singapore
