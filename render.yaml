services:
  - type: web
    name: smart-police-backend
    env: node
    plan: free
    region: singapore
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-police-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

  - type: static_site
    name: smart-police-portal
    buildCommand: cd frontend-web && npm install && npm run build
    publishPath: ./frontend-web/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: smart-police-backend
          property: host

databases:
  - name: smart-police-db
    plan: free
    region: singapore
